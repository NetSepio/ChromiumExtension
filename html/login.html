<!DOCTYPE HTML>
<html>

<head>
    <title>Login | NetSepio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <script src="../vendors/jquery-3.5.1/jquery-3.5.1.js" defer></script>
    <script src="../vendors/popperjs-2.5.4/popper.min.js" defer></script>
    <script src="../vendors/bootstrap-4.3.1/js/bootstrap.min.js" defer></script>
    <script src="../scripts/login.js" defer></script>

    <link rel="stylesheet" href="../vendors/bootstrap-4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>

<body>

    <table class="header">
        <tr>
            <td>
                <img class="logo" src='../images/icon128.png' id='logo'>
            </td>
            <td>
                <h1>NetSepio <sup>0.2</sup></h1>
            </td>
        </tr>
    </table>

    <div class="tabs">
        <div class="tab-2">
            <label for="tab2-1">Login</label>
            <input id="tab2-1" name="tabs-two" type="radio" checked="checked">
            <div id="login">
                <h4>Login</h4>
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" class="form-control is-valid" id="loginEmail" placeholder="name@example.com">
                    <small id="loginEmailHelp" class="form-text text-muted">Enter your email address registered with Lazarus Network.</small>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" class="form-control is-valid" id="loginPassword" placeholder="Password">
                    <small id="loginPasswordHelp" class="form-text text-muted">Password incorrect.</small>
                </div>
                <button id="loginButton" class="btn btn-primary">Submit</button>
            </div>
        </div>
        <div class="tab-2">
            <label for="tab2-2">Register</label>
            <input id="tab2-2" name="tabs-two" type="radio">
            <div id="register">
                <h4>Register</h4>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-control is-valid" id="name" placeholder="Full Name">
                    <small id="nameHelp" class="form-text text-muted">Enter Your Full Name.</small>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control is-valid" id="email" placeholder="name@example.com">
                    <small id="emailHelp" class="form-text text-muted">We won't share your email with anyone without your consent.</small>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control is-invalid" id="password" placeholder="Password">
                    <small id="passwordHelp" class="form-text text-muted">Enter A Strong Password.</small>
                </div>
                <div class="form-group">
                    <label for="passwordVerification">Verify Password</label>
                    <input type="password" class="form-control is-invalid" id="passwordVerification" placeholder="Password">
                    <small id="passwordVerificationHelp" class="form-text text-muted">Enter Password Again.</small>
                </div>
                <button id="registerButton" class="btn btn-primary">Submit</button>
            </div>
        </div>
    </div>

    <section class="footer">
        <p>© Lazarus Network 2020</p>
    </section>
</body>

</html>
